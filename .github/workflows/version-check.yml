name: Version consistency check

on:
  pull_request:
    branches:
      - main

jobs:
  check-versions:
    name: Check version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches across files
        run: |
          VERSION=$(grep "^version:" SKILL.md | sed 's/version: //')
          FAIL=0

          grep -q "v${VERSION}" README.md || {
            echo "README.md does not reference v${VERSION}"
            FAIL=1
          }

          grep -q "Version: ${VERSION}" gist/claude-pressure-test.md || {
            echo "gist/claude-pressure-test.md does not reference Version: ${VERSION}"
            FAIL=1
          }

          grep -q "^## v${VERSION}" CHANGELOG.md || {
            echo "CHANGELOG.md has no entry for v${VERSION}"
            FAIL=1
          }

          [ $FAIL -eq 0 ] && echo "All version references consistent: v${VERSION}"
          exit $FAIL
