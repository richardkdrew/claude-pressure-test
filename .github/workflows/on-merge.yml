name: Release and publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from SKILL.md
        id: version
        run: |
          VERSION=$(grep "^version:" SKILL.md | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          awk "/^## v${VERSION}/{found=1; next} found && /^## v/{exit} found{print}" CHANGELOG.md > /tmp/notes.md
          gh release create "v${VERSION}" --title "v${VERSION}" --notes-file /tmp/notes.md

  publish-gist:
    name: Publish gist
    runs-on: ubuntu-latest
    env:
      GIST_ID: c062631fdfee41fac10e815973576407
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if gist file changed
        id: gist_check
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^gist/claude-pressure-test.md$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update published gist
        if: steps.gist_check.outputs.changed == 'true'
        env:
          GIST_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          jq -n --rawfile content gist/claude-pressure-test.md \
            '{"files": {"claude-pressure-test.md": {"content": $content}}}' \
          | curl -s --fail -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            -d @- \
            "https://api.github.com/gists/$GIST_ID"
